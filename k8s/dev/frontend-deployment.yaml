apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-codegen-frontend
  namespace: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-codegen-frontend
  template:
    metadata:
      labels:
        app: ai-codegen-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: frontend
          image: ghcr.io/OWNER/ai-codegen-web:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
          env:
            - name: NEXT_PUBLIC_API_URL
              value: http://ai-codegen-backend-service/api
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
